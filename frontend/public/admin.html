<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>Admin Dashboard</h1>

      <div id="gatewayAlert" class="banner hidden">
        Gateway latency alert: average latency is above 1000ms over the last ~30 seconds.
      </div>

      <section class="card">
        <h2>Service Health</h2>
        <div id="healthGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>RabbitMQ Queue Status</h2>
        <div id="queueGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Live Metrics</h2>
        <div id="metricsGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Service Logs</h2>
        <div id="logsContainer" class="logs-container"></div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
