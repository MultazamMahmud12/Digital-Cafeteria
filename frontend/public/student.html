<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Order Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Student Portal</h1>

      <section class="card">
        <h2>Login</h2>
        <form id="loginForm" class="form-grid">
          <label>
            Student ID
            <input id="studentId" required />
          </label>
          <label>
            Password
            <input id="password" type="password" required />
          </label>
          <button type="submit">Sign in</button>
        </form>
        <p id="authInfo" class="muted">Not signed in</p>
      </section>

      <section class="card">
        <h2>Place Order</h2>
        <form id="orderForm" class="form-grid">
          <label>
            SKU
            <input id="sku" value="coffee" required />
          </label>
          <label>
            Quantity
            <input id="qty" type="number" min="1" value="1" required />
          </label>
          <button type="submit">Place order</button>
        </form>
        <p id="orderInfo" class="muted">No order yet</p>
      </section>

      <section class="card">
        <h2>Live Status Tracker</h2>
        <ol id="statusTracker" class="tracker">
          <li data-status="PENDING">PENDING</li>
          <li data-status="STOCK_VERIFIED">STOCK_VERIFIED</li>
          <li data-status="IN_KITCHEN">IN_KITCHEN</li>
          <li data-status="READY">READY</li>
        </ol>
      </section>
    </main>

    <script src="/student.js"></script>
  </body>
</html>
