version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cafeteria
    healthcheck:
      test: mongosh --eval 'db.adminCommand("ping")'
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: identity-service
    ports:
      - "3001:3001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-user_secret}
      MONGO_URL: mongodb://mongodb:27017/cafeteria
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway-service:
    build:
      context: ./order-gatewar-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      STOCK_SERVICE_URL: http://localhost:3002
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
